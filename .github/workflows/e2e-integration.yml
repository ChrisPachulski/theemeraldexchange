name: E2E Integration

# Real client↔server e2e tiers (playwright.config.ts, PW_INTEGRATION=1):
#   - `integration`     — real Hono backend + Vite, upstreams stubbed at the
#                         HTTP boundary, zero route mocks.
#   - `playback-chrome` — real-codec MSE playback gate on BRANDED Chrome
#                         (bundled Chromium lacks H.264/AAC and would
#                         false-negative the exact grey-box bug class this
#                         gate exists for).
# The fast mocked tier stays in ci.yml; this workflow only runs the slower
# real-backend tiers, path-filtered to changes that can affect them.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'src/**'
      - 'tests/**'
      - 'crates/emerald-contracts-napi/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-integration.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'src/**'
      - 'tests/**'
      - 'crates/emerald-contracts-napi/**'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-integration.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      # The @emerald/contracts-napi file: dep builds its .node during `npm ci`
      # (prepare script). The crate's rust-version is 1.96, so the runner's
      # default rust is too old — pin 1.96 explicitly, otherwise the addon
      # silently fails to build and the real backend can't boot.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - name: Install dependencies
        run: npm ci

      # The bare-production self-host claim gate serves the built SPA from the
      # backend. Build it explicitly so a clean runner can never skip that test.
      - name: Build production SPA
        run: npm run build:spa

      # Chromium drives the `integration` project; --with-deps pulls the
      # shared browser OS libraries.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # BRANDED Chrome for the `playback-chrome` MSE gate — the only
      # browser with the proprietary H.264/AAC decoders the fixture needs.
      # Installs to /opt/google/chrome/chrome, which playwright.config.ts
      # probes before registering the project.
      - name: Install real Chrome (proprietary codecs)
        run: npx playwright install chrome

      - name: Integration tier (real backend, zero mocks)
        run: npm run test:e2e:integration

      - name: Playback tier (real-Chrome MSE gate)
        run: npm run test:e2e:playback

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-integration-report
          path: playwright-report/
          retention-days: 14
