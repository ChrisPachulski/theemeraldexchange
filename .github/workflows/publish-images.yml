# Publish multi-arch self-host images to GHCR (plan 006 Phase 5).
#
# Strategy (open-question #4 resolved): build each arch NATIVELY — amd64 on
# ubuntu-latest, arm64 on the free ubuntu-24.04-arm runners — and merge the
# per-arch digests into one manifest list. Never qemu-emulate the Rust
# workspace builds (media-core/transcoder compile the whole workspace; under
# qemu that is hours, natively it is minutes) and NEVER build on the NAS.
#
# Images:
#   ghcr.io/<owner>/theemeraldexchange-backend      (Dockerfile, BUNDLE_SPA=on
#                                                    → serves the SPA same-origin)
#   ghcr.io/<owner>/theemeraldexchange-media-core   (crates/media-core/Dockerfile)
#   ghcr.io/<owner>/theemeraldexchange-transcoder   (crates/transcoder/Dockerfile)
#   ghcr.io/<owner>/theemeraldexchange-recommender  (recommender/Dockerfile)
#
# Tags (Seerr model): latest + vX.Y.Z + vX.Y + vX on version tags;
# `develop` on workflow_dispatch from a branch.
#
# eex-ytresolve: prebuilt x86_64 release asset (its own repo's CI). The
# arm64 image ships an exec-fail stub instead — server/services/ytresolve.ts
# falls back to yt-dlp on any resolver failure, so trailers still work.

name: publish-images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: backend
            dockerfile: ./Dockerfile
            build-args: |
              BUNDLE_SPA=on
              EEX_RELEASE=${{ github.ref_name }}
          - name: media-core
            dockerfile: ./crates/media-core/Dockerfile
            build-args: ""
          - name: transcoder
            dockerfile: ./crates/transcoder/Dockerfile
            build-args: ""
          - name: recommender
            dockerfile: ./recommender/Dockerfile
            build-args: ""
        platform:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Stage eex-ytresolve (backend only)
        if: matrix.service.name == 'backend'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bin
          if [ "${{ matrix.platform.arch }}" = "amd64" ]; then
            # Real prebuilt resolver. Falls back to a stub if the release
            # asset is unavailable (resolver degrades to yt-dlp at runtime).
            gh release download --repo ChrisPachulski/rust-yt-extractor \
              --pattern 'eex-ytresolve-x86_64-linux' \
              --output bin/eex-ytresolve --clobber \
              || printf '#!/bin/sh\nexit 1\n' > bin/eex-ytresolve
          else
            # No arm64 release yet: exec-fail stub → yt-dlp fallback.
            printf '#!/bin/sh\nexit 1\n' > bin/eex-ytresolve
          fi
          chmod +x bin/eex-ytresolve

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercased owner)
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/theemeraldexchange-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"

      - name: Build + push by digest (${{ matrix.service.name }}/${{ matrix.platform.arch }})
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          platforms: linux/${{ matrix.platform.arch }}
          build-args: ${{ matrix.service.build-args }}
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=publish-${{ matrix.service.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=publish-${{ matrix.service.name }}-${{ matrix.platform.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: digests-${{ matrix.service.name }}-${{ matrix.platform.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, media-core, transcoder, recommender]
    steps:
      - name: Download digests
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: digests-${{ matrix.service }}-*
          path: /tmp/digests
          merge-multiple: true

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (latest + semver aliases)
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893 # v5.9.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/theemeraldexchange-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=develop,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/theemeraldexchange-${{ matrix.service }}"
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/theemeraldexchange-${{ matrix.service }}"
          TAG=$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$TAG"
