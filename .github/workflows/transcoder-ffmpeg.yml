# Real-ffmpeg gate for the M4 transcoder.
#
# WHY THIS EXISTS
# The default `cargo test -p transcoder` suite is hermetic: it drives the
# session state machine against a shell stub (TRANSCODER_FFMPEG_BIN) and never
# decodes a byte. That proves the lifecycle + argv strings, NOT that the argv we
# assemble actually produces playable HLS. This job closes that gap by running
# the `requires-ffmpeg` feature-gated integration test
# (crates/transcoder/tests/real_ffmpeg.rs) against a REAL ffmpeg/ffprobe — the
# same statically-linked build pinned in crates/transcoder/Dockerfile.
#
# HUMAN DECISION CAPTURED HERE
# Adopting this job is a product/infra call (CI runner minutes + image pull
# budget). Until it is green in CI, M4 must be read as "state-machine complete,
# transcode unverified" (see docs/ROADMAP-STATUS.md). See also
# docs/M4-TRANSCODE-VERIFICATION.md for the full rationale.

name: transcoder-ffmpeg

# Trigger on the transcoder AND everything it compiles against: it depends on
# crates/media-core and crates/emerald-contracts, and a workspace dependency
# bump (Cargo.lock / root Cargo.toml) can change the produced ffmpeg argv or
# the binary's behavior without touching crates/transcoder/** at all.
on:
  push:
    paths:
      - "crates/transcoder/**"
      - "crates/media-core/**"
      - "crates/emerald-contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/transcoder-ffmpeg.yml"
  pull_request:
    paths:
      - "crates/transcoder/**"
      - "crates/media-core/**"
      - "crates/emerald-contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/transcoder-ffmpeg.yml"
  workflow_dispatch: {}

jobs:
  real-ffmpeg:
    # Runs on the runner host (NOT inside a container) so the Docker CLI is
    # available — that's how we extract the EXACT binaries prod ships instead of
    # chasing a release tarball. (The previous revision pulled
    #   github.com/wader/static-ffmpeg/releases/download/7.1/linux-amd64.tar.xz
    # which 404s: static-ffmpeg is published as a Docker image, not a GitHub
    # release asset, so every run failed at setup before the gate ever ran.)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install static ffmpeg/ffprobe (byte-identical to the runtime Dockerfile)
        shell: bash
        run: |
          set -euo pipefail
          # The runtime stage does:
          #   COPY --from=mwader/static-ffmpeg:7.1 /ffmpeg /ffprobe /usr/local/bin/
          # Reproduce it exactly: create a throwaway container from that pinned
          # image and copy the two static binaries out onto PATH. No glibc/runtime
          # deps (fully static), so a plain copy is enough.
          FF_IMAGE="mwader/static-ffmpeg:7.1"
          docker pull "$FF_IMAGE"
          cid="$(docker create "$FF_IMAGE")"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          sudo docker cp "$cid:/ffmpeg"  /usr/local/bin/ffmpeg
          sudo docker cp "$cid:/ffprobe" /usr/local/bin/ffprobe
          sudo chmod 0755 /usr/local/bin/ffmpeg /usr/local/bin/ffprobe
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-transcoder-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-transcoder-
            ${{ runner.os }}-cargo-

      - name: Run the real-ffmpeg gate
        env:
          TRANSCODER_FFMPEG_BIN: /usr/local/bin/ffmpeg
          TRANSCODER_FFPROBE_BIN: /usr/local/bin/ffprobe
        run: cargo test -p transcoder --features requires-ffmpeg -- --nocapture
