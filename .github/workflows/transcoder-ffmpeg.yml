# Real-ffmpeg gate for the M4 transcoder.
#
# WHY THIS EXISTS
# The default `cargo test -p transcoder` suite is hermetic: it drives the
# session state machine against a shell stub (TRANSCODER_FFMPEG_BIN) and never
# decodes a byte. That proves the lifecycle + argv strings, NOT that the argv we
# assemble actually produces playable HLS. This job closes that gap by running
# the `requires-ffmpeg` feature-gated integration test
# (crates/transcoder/tests/real_ffmpeg.rs) against a REAL ffmpeg/ffprobe — the
# SAME apt-installed Debian bookworm ffmpeg the production image ships
# (crates/transcoder/Dockerfile's runtime stage), not a newer static build.
#
# PROD PARITY (what IS and ISN'T tested)
# The job runs inside the same digest-pinned debian:bookworm-slim base as the
# runtime stage and installs ffmpeg from the same Debian repos, so the binary
# under test matches production (~5.1.x) including its encoder/muxer feature
# set. NOT covered here: the VAAPI hardware path (h264_vaapi via
# /dev/dri/renderD128 + intel-media-va-driver) — GitHub runners have no iGPU,
# so CI exercises the software (libx264) pipeline only; the boot smoke-test's
# VAAPI→libx264 demotion is what makes that a faithful no-GPU configuration.
#
# HUMAN DECISION CAPTURED HERE
# Adopting this job is a product/infra call (CI runner minutes + image pull
# budget). It proves the real-ffmpeg fixture path in CI; deployed real-library
# serving and real-client playback are tracked separately in
# docs/M4-TRANSCODE-VERIFICATION.md and docs/ROADMAP-STATUS.md.

name: transcoder-ffmpeg

# Trigger on the transcoder AND everything it compiles against: it depends on
# crates/media-core and crates/emerald-contracts, and a workspace dependency
# bump (Cargo.lock / root Cargo.toml) can change the produced ffmpeg argv or
# the binary's behavior without touching crates/transcoder/** at all.
on:
  push:
    paths:
      - "crates/transcoder/**"
      - "crates/media-core/**"
      - "crates/emerald-contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/transcoder-ffmpeg.yml"
  pull_request:
    paths:
      - "crates/transcoder/**"
      - "crates/media-core/**"
      - "crates/emerald-contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/transcoder-ffmpeg.yml"
  workflow_dispatch: {}

# Least-privilege token: the job checks out code, compiles, and runs tests —
# it never writes to the repo, packages, or PRs.
permissions:
  contents: read

jobs:
  real-ffmpeg:
    runs-on: ubuntu-latest
    # Mirror crates/transcoder/Dockerfile's runtime stage: SAME digest-pinned
    # debian:bookworm-slim base, SAME apt ffmpeg. Keep this digest in lockstep
    # with the Dockerfile when dependabot bumps it.
    container:
      image: debian:bookworm-slim@sha256:0104b334637a5f19aa9c983a91b54c89887c0984081f2068983107a6f6c21eeb
    timeout-minutes: 30

    steps:
      # Toolchain + the production ffmpeg, from the same Debian repos the
      # runtime image installs from. build-essential/pkg-config compile the
      # Rust workspace inside the slim container; curl + ca-certificates are
      # for the rustup installer dtolnay/rust-toolchain runs when rustup is
      # absent; git keeps actions/checkout on the fast git path; zstd is for
      # actions/cache. libva2/libva-drm2 ride in as ffmpeg dependencies,
      # matching the runtime stage's VAAPI userspace (the hardware path still
      # can't run here — no /dev/dri on GitHub runners; see header).
      - name: Install prod-parity ffmpeg + build toolchain (Debian bookworm apt)
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          # cmake + perl: aws-lc-sys (rustls's default crypto provider, pulled
          # in via reqwest/sentry) builds its C/asm sources with CMake.
          apt-get install -y --no-install-recommends \
            ca-certificates curl git build-essential pkg-config cmake perl zstd \
            ffmpeg libva2 libva-drm2
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Prod-parity guard: this job's whole premise is "same digest-pinned
      # debian:bookworm-slim base as crates/transcoder/Dockerfile's runtime
      # stage". The two pins used to track each other by hand (a dependabot
      # bump of one silently breaks the parity claim) — so extract the digest
      # from BOTH files and fail loudly on drift. The `container:` image can't
      # be introspected from job context, but it is defined in this very
      # workflow file, which is in the checkout.
      - name: Guard - container base matches the transcoder Dockerfile runtime stage
        shell: bash
        run: |
          set -euo pipefail
          dockerfile_pin=$(grep -oE 'debian:bookworm-slim@sha256:[0-9a-f]{64}' crates/transcoder/Dockerfile | tail -n1)
          workflow_pin=$(grep -oE 'debian:bookworm-slim@sha256:[0-9a-f]{64}' .github/workflows/transcoder-ffmpeg.yml | head -n1)
          echo "Dockerfile runtime base: ${dockerfile_pin}"
          echo "Workflow container:      ${workflow_pin}"
          if [ -z "$dockerfile_pin" ] || [ -z "$workflow_pin" ]; then
            echo "::error::Could not extract a debian:bookworm-slim digest pin from one of the files — the guard's grep needs updating."
            exit 1
          fi
          if [ "$dockerfile_pin" != "$workflow_pin" ]; then
            echo "::error::Base-image drift: this workflow's container digest no longer matches crates/transcoder/Dockerfile's runtime stage. Bump BOTH together — the job only proves prod parity when they are identical."
            exit 1
          fi
          echo "Pins match — prod parity holds."

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-transcoder-bookworm-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-transcoder-bookworm-

      - name: Run the real-ffmpeg gate
        env:
          TRANSCODER_FFMPEG_BIN: /usr/bin/ffmpeg
          TRANSCODER_FFPROBE_BIN: /usr/bin/ffprobe
        run: cargo test -p transcoder --features requires-ffmpeg -- --nocapture
