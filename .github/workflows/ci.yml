name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (SPA)
        run: npx tsc --noEmit

      - name: Type-check (server)
        run: npx tsc -p server/tsconfig.json

      - name: Lint
        run: npm run lint

      # vitest run --coverage runs the suite once and produces an HTML
      # coverage report. No separate `npm test` step — would just rerun.
      - name: Test + coverage
        run: npm run test:coverage

      - name: Build (Vite + server tsc)
        run: npm run build

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Upload SPA build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  recommender:
    # Python sidecar has no test suite yet — at minimum keep it from
    # silently developing a syntax error. compileall is a 1-second
    # parse-only sweep over both packages.
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Syntax check (recommender)
        run: python3 -m compileall -q recommender/app recommender/workers
