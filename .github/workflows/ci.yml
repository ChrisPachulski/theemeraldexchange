name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Bumped from 8 → 15: Playwright install adds ~45s (chromium-only,
    # cached browsers on subsequent runs) and the 7-spec suite runs
    # ~50s on GitHub-hosted runners.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (SPA)
        run: npx tsc --noEmit

      - name: Type-check (server)
        run: npx tsc -p server/tsconfig.json

      - name: Lint
        run: npm run lint

      # vitest run --coverage runs the suite once and produces an HTML
      # coverage report. No separate `npm test` step — would just rerun.
      - name: Test + coverage
        run: npm run test:coverage

      - name: Build (Vite + server tsc)
        run: npm run build

      # Install only the Chromium browser + its OS deps. The
      # playwright.config.ts pins projects to chromium-only, so
      # downloading the full Firefox/WebKit binaries (~400 MB) on every
      # CI run would burn time and bandwidth for no coverage gain.
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Upload SPA build
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  test-no-iptv:
    # Reviewer-insurance gate per contract §13.3 — boot with
    # IPTV_DISABLED=1 and confirm the test suite still passes. The
    # IPTV-disabled-specific test (server/app.iptv-disabled.test.ts)
    # already runs in the main job; this matrix re-runs the WHOLE
    # suite with the env set globally to catch any cross-feature
    # surface that quietly depends on /api/iptv being mounted.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      IPTV_DISABLED: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vitest (IPTV_DISABLED=1)
        run: npm test

      - name: Build (Vite — confirms SPA still bundles without IPTV at runtime)
        run: npm run build:spa

  recommender:
    # Python sidecar — syntax check + cross-language parity tests against
    # the emerald-contracts PyO3 binding. The parity tests are the same
    # tests/vectors/*.json the Rust and TS sides run; if recommender
    # produces different bytes than Hono, this job fails.
    #
    # This job is also the home of the N-API↔PyO3 cross-binding gate
    # (M13): it has BOTH toolchains (Python+Rust for the PyO3 wheel,
    # Node for the napi addon), so it's the one place we can mint a JWE
    # via N-API and decrypt it via PyO3 in the same run. The wheel is
    # installed into recommender/.venv so the Node test's PYTHON_PATH
    # resolves, and the Node test runs with CI_REQUIRE_CROSS_BINDING=1
    # so a missing/drifted extension turns the gate red, not green.
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pyo3-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pyo3-
            ${{ runner.os }}-cargo-

      - name: Syntax check (recommender)
        run: python3 -m compileall -q recommender/app recommender/workers

      - name: Install maturin + pytest
        run: pip install maturin pytest pydantic fastapi

      # Build once into a wheel, then install it into BOTH the bare job
      # interpreter (for the pytest parity step) and a recommender/.venv
      # (for the Node cross-binding gate, whose PYTHON_PATH resolves to
      # recommender/.venv/bin/python). One wheel, two install targets.
      - name: Build emerald-contracts wheel
        working-directory: crates/emerald-contracts-pyo3
        run: maturin build --release --out wheels

      - name: Install wheel into job's Python env
        run: pip install crates/emerald-contracts-pyo3/wheels/*.whl

      # Provision the venv the Node cross-binding test expects and install
      # the same wheel into it, so HAVE_PYTHON is true there.
      - name: Provision recommender/.venv with PyO3 wheel (cross-binding gate)
        run: |
          python3 -m venv recommender/.venv
          recommender/.venv/bin/python -m pip install --upgrade pip
          recommender/.venv/bin/python -m pip install crates/emerald-contracts-pyo3/wheels/*.whl
          recommender/.venv/bin/python -c "import emerald_contracts; print('emerald_contracts OK')"

      - name: Cross-language parity tests (recommender ↔ Rust ↔ TS)
        working-directory: recommender
        run: pytest tests/test_emerald_contracts_parity.py tests/test_sub_validation.py tests/test_internal_principal.py -v

      # Node side of the gate: install JS deps + build the napi addon,
      # then run the N-API→PyO3 cross-binding test with the require flag
      # so a missing/drifted PyO3 extension fails the job instead of
      # skipping. This is the M3-cutover wire-parity property exercised
      # in CI for the first time.
      - name: Install JS dependencies
        run: npm ci

      - name: Build napi addon
        run: npm run build:napi

      - name: Cross-binding N-API↔PyO3 gate (Node)
        env:
          CI_REQUIRE_CROSS_BINDING: '1'
        run: npx vitest run server/services/internalPrincipal.crossBinding.test.ts

  rust:
    # emerald-contracts crate: canonical cross-language source of truth
    # for token formats, HKDF derivations, sub-namespace, PII scrub.
    # Hono (N-API) and Apple (Swift port) MUST agree with this crate
    # byte-for-byte. tests/vectors/*.json are the interop oracle —
    # every TS/Rust/Swift impl runs them and the bytes must match.
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90'
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Format check first — fastest signal.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        # Allow this to soft-fail until we wire a pre-commit hook;
        # the actual correctness gate is the test step below.
        continue-on-error: true

      - name: cargo clippy
        run: cargo clippy --all-targets --workspace -- -D warnings
        continue-on-error: true

      # emerald-contracts-pyo3 uses pyo3's extension-module feature,
      # which can't be linked by plain `cargo build` — it requires the
      # Python interpreter that maturin sets up. The recommender CI
      # job builds + tests it via maturin; exclude it here so this job
      # stays focused on the pure-Rust crates.
      - name: cargo build (workspace minus pyo3)
        run: cargo build --workspace --exclude emerald-contracts-pyo3 --all-targets

      # Vector parity test gate — Rust crate produces byte-identical
      # output to TS for stream-token-canonical.json and hkdf-parity.json.
      # If this fails, Rust and TS have diverged on a wire-level format
      # and Apple/M3/M4 ports will silently break.
      - name: cargo test (workspace minus pyo3)
        run: cargo test --workspace --exclude emerald-contracts-pyo3 --all-targets

  dependency-audit:
    # Supply-chain gate: fail CI on known high/critical advisories across
    # all three ecosystems (npm prod deps, Rust crates, recommender Python).
    # This is App-Store-bound; prod-dependency high/critical CVEs MUST block.
    # Each gating audit step is intentionally BLOCKING (no continue-on-error) —
    # tests/ci/dependency-audit.workflow.test.ts enforces that it stays so.
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      # --- npm (prod dependencies only) ---
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Emit the full JSON report BEFORE the gate so it survives a red gate.
      - name: npm audit report (json)
        run: npm audit --audit-level=high --omit=dev --json > npm-audit.json || true

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: npm-audit.json
          retention-days: 14

      # --omit=dev: devDependency-only advisories (build tooling) don't gate
      # prod. Blocking — prod high/critical CVEs fail CI.
      - name: npm audit (high+ severity)
        run: npm audit --audit-level=high --omit=dev

      # --- cargo (Rust crates, reads committed Cargo.lock) ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.90'

      # Cache the cargo-audit binary so we don't rebuild it every run.
      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-bin

      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked --version '^0.21'

      # Reads Cargo.lock at repo root. Blocking.
      - name: cargo audit
        run: cargo audit --deny warnings

      # --- pip-audit (recommender Python deps, metadata-only) ---
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      # Audit the recommender pyproject WITHOUT building the 6GB torch /
      # sentence-transformers stack — pip-audit resolves dependency metadata.
      # pip-audit >=2.7 audits a pyproject project via --project-path; fall
      # back to auditing the project dir directly if the flag is unavailable.
      # Blocking: pip-audit exits non-zero on any known vuln by default.
      - name: pip-audit (recommender)
        run: |
          if pip-audit --help 2>&1 | grep -q -- '--project-path'; then
            pip-audit --progress-spinner=off --desc --project-path recommender
          else
            cd recommender && pip-audit --progress-spinner=off --desc .
          fi
