name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Bumped from 8 → 15: Playwright install adds ~45s (chromium-only,
    # cached browsers on subsequent runs) and the 7-spec suite runs
    # ~50s on GitHub-hosted runners.
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      # The @emerald/contracts-napi file: dep builds its .node during `npm ci`
      # (prepare script). The crate's rust-version is 1.96, so the runner's
      # default rust is too old — pin 1.96 explicitly, otherwise the addon
      # silently fails to build and the device-token crypto tests can't load it.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (SPA)
        run: npx tsc --noEmit

      - name: Type-check (server)
        run: npx tsc -p server/tsconfig.json

      - name: Lint
        run: npm run lint

      # vitest run --coverage runs the suite once and produces an HTML
      # coverage report. No separate `npm test` step — would just rerun.
      - name: Test + coverage
        run: npm run test:coverage

      - name: Build (Vite + server tsc)
        run: npm run build

      # Install only the Chromium browser + its OS deps. The
      # playwright.config.ts pins projects to chromium-only, so
      # downloading the full Firefox/WebKit binaries (~400 MB) on every
      # CI run would burn time and bandwidth for no coverage gain.
      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Upload SPA build
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  test-no-iptv:
    # Reviewer-insurance gate per contract §13.3 — boot with
    # IPTV_DISABLED=1 and confirm the test suite still passes. The
    # IPTV-disabled-specific test (server/app.iptv-disabled.test.ts)
    # already runs in the main job; this matrix re-runs the WHOLE
    # suite with the env set globally to catch any cross-feature
    # surface that quietly depends on /api/iptv being mounted.
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      IPTV_DISABLED: '1'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      # The @emerald/contracts-napi file: dep builds its .node during `npm ci`
      # (prepare script). The crate's rust-version is 1.96, so the runner's
      # default rust is too old — pin 1.96 explicitly, otherwise the addon
      # silently fails to build and the device-token crypto tests can't load it.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - name: Install dependencies
        run: npm ci

      - name: Vitest (IPTV_DISABLED=1)
        run: npm test

      - name: Build (Vite — confirms SPA still bundles without IPTV at runtime)
        run: npm run build:spa

  recommender:
    # Python sidecar — syntax check + cross-language parity tests against
    # the emerald-contracts PyO3 binding. The parity tests are the same
    # tests/vectors/*.json the Rust and TS sides run; if recommender
    # produces different bytes than Hono, this job fails.
    #
    # This job is also the home of the N-API↔PyO3 cross-binding gate
    # (M13): it has BOTH toolchains (Python+Rust for the PyO3 wheel,
    # Node for the napi addon), so it's the one place we can mint a JWE
    # via N-API and decrypt it via PyO3 in the same run. The wheel is
    # installed into recommender/.venv so the Node test's PYTHON_PATH
    # resolves, and the Node test runs with CI_REQUIRE_CROSS_BINDING=1
    # so a missing/drifted extension turns the gate red, not green.
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pyo3-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-pyo3-
            ${{ runner.os }}-cargo-

      - name: Syntax check (recommender)
        run: python3 -m compileall -q recommender/app recommender/workers

      # Install the EXACT dependency set the production image ships
      # (recommender/requirements.lock) minus torch: the +cpu torch wheel is
      # heavyweight and only workers/featurize.py imports it (lazily, inside
      # the embed function) — no test under tests/ or eval/ reaches it. The
      # lock is the full transitive closure, so --no-deps keeps pip from
      # re-resolving (and from pulling CUDA torch via sentence-transformers).
      # Tooling pins: maturin within the Dockerfile's >=1.7,<2.0 range; ruff
      # pinned so lint results are reproducible; pytest satisfies pyproject's
      # dev floor (>=8.3).
      - name: Install recommender deps (requirements.lock minus torch) + pinned tooling
        working-directory: recommender
        run: |
          grep -v '^torch==' requirements.lock > /tmp/ci-requirements.txt
          pip install --no-deps -r /tmp/ci-requirements.txt
          pip install maturin==1.8.1 pytest==8.3.5 ruff==0.15.15

      # ruff is the lint gate used locally (pyproject [tool.ruff]); without
      # this step it was never enforced in CI.
      - name: Lint (ruff)
        working-directory: recommender
        run: ruff check .

      # Build once into a wheel, then install it into BOTH the bare job
      # interpreter (for the pytest parity step) and a recommender/.venv
      # (for the Node cross-binding gate, whose PYTHON_PATH resolves to
      # recommender/.venv/bin/python). One wheel, two install targets.
      - name: Build emerald-contracts wheel
        working-directory: crates/emerald-contracts-pyo3
        run: maturin build --release --out wheels

      - name: Install wheel into job's Python env
        run: pip install crates/emerald-contracts-pyo3/wheels/*.whl

      # Provision the venv the Node cross-binding test expects and install
      # the same wheel into it, so HAVE_PYTHON is true there.
      - name: Provision recommender/.venv with PyO3 wheel (cross-binding gate)
        run: |
          python3 -m venv recommender/.venv
          recommender/.venv/bin/python -m pip install --upgrade pip
          recommender/.venv/bin/python -m pip install crates/emerald-contracts-pyo3/wheels/*.whl
          recommender/.venv/bin/python -c "import emerald_contracts; print('emerald_contracts OK')"

      - name: Recommender test suite (tests/ + eval/, full lock minus torch)
        working-directory: recommender
        # The full suite — scoring path, retrieval, optimizer, migrator,
        # telemetry, schemas, parity — runs against the lock-pinned
        # environment installed above. Only torch is absent; its sole import
        # is lazy (workers/featurize.py inside the embed function) and no
        # collected test reaches it, so collection is clean. eval/ carries
        # test_build_holdout.py for the operator holdout tooling.
        run: pytest tests/ eval/test_build_holdout.py -v

      # Node side of the gate: install JS deps + build the napi addon,
      # then run the N-API→PyO3 cross-binding test with the require flag
      # so a missing/drifted PyO3 extension fails the job instead of
      # skipping. This is the M3-cutover wire-parity property exercised
      # in CI for the first time.
      - name: Install JS dependencies
        run: npm ci

      - name: Build napi addon
        run: npm run build:napi

      - name: Cross-binding N-API↔PyO3 gate (Node)
        env:
          CI_REQUIRE_CROSS_BINDING: '1'
        run: npx vitest run server/services/internalPrincipal.crossBinding.test.ts

  rust:
    # emerald-contracts crate: canonical cross-language source of truth
    # for token formats, HKDF derivations, sub-namespace, PII scrub.
    # Hono (N-API) and Apple (Swift port) MUST agree with this crate
    # byte-for-byte. tests/vectors/*.json are the interop oracle —
    # every TS/Rust/Swift impl runs them and the bytes must match.
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Format check first — fastest signal.
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        # Hard gate: the workspace is fmt-clean, so a fmt drift is now a real
        # failure (no more advisory soft-fail). Run `cargo fmt --all` locally
        # before pushing.

      - name: cargo clippy
        # Gating: removed continue-on-error. emerald-contracts is the canonical
        # cross-language crypto crate (token/JWE/HMAC/HKDF) where clippy catches
        # real soundness issues; an advisory lint never enforces the
        # deny-warnings intent. fmt above is now a hard gate too.
        run: cargo clippy --all-targets --workspace -- -D warnings

      # emerald-contracts-pyo3 uses pyo3's extension-module feature,
      # which can't be linked by plain `cargo build` — it requires the
      # Python interpreter that maturin sets up. The recommender CI
      # job builds + tests it via maturin; exclude it here so this job
      # stays focused on the pure-Rust crates.
      - name: cargo build (workspace minus pyo3)
        run: cargo build --workspace --exclude emerald-contracts-pyo3 --all-targets

      # Vector parity test gate — Rust crate produces byte-identical
      # output to TS for stream-token-canonical.json and hkdf-parity.json.
      # If this fails, Rust and TS have diverged on a wire-level format
      # and Apple/M3/M4 ports will silently break.
      - name: cargo test (workspace minus pyo3)
        run: cargo test --workspace --exclude emerald-contracts-pyo3 --all-targets

  audit:
    # Dependency vulnerability gate (production-readiness MEDIUM #7/#23).
    # Runs npm audit, cargo audit, and pip-audit in parallel sub-steps so a
    # known CVE in any layer blocks the merge before it reaches main.
    # pip-audit scans recommender/pyproject.toml via --requirement to avoid
    # needing a full venv install.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch, 2026-03-27; explicit `toolchain` input pins the actual compiler
        with:
          toolchain: '1.96'

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-audit-

      - name: Install JS dependencies (for npm audit)
        run: npm ci

      - name: npm audit (high+)
        # --audit-level=high fails on high/critical only; moderate advisories
        # are tracked but do not block CI. Promote to moderate once the tree
        # is clean of existing moderate findings.
        run: npm audit --audit-level=high --omit=dev

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (recommender)
        # Audit the EXACT shipped dependency set — the committed lock the Docker
        # image installs from (recommender/requirements.lock) — instead of a
        # freshly re-resolved pyproject (which drifts from what actually ships).
        # torch is pinned to the +cpu local build, which isn't a PyPI release the
        # advisory DB keys on, so strip the +cpu suffix for the audit only: the
        # CPU build is the same upstream 2.x.x release, just a different wheel.
        working-directory: recommender
        run: |
          sed 's/+cpu//' requirements.lock > /tmp/recommender-audit.txt
          pip-audit -r /tmp/recommender-audit.txt

  docker-build:
    # Every other job runs on the host runner via npm/cargo/pytest — nothing
    # builds the multi-stage Dockerfiles that actually ship. Their fragile logic
    # (cross-stage NAPI .node staging, static-ffmpeg COPY, better-sqlite3 source
    # compile) only fails at `docker compose up --build` on the NAS, not in CI.
    # Validate compose interpolation on every run and build the backend image so
    # image-build regressions are caught pre-deploy. The heavy sidecar images
    # (recommender torch, media-core/transcoder Rust) build only on the deploy
    # branch to keep PR feedback fast.
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate compose config
        # `docker compose config` resolves ${...} interpolation and validates the
        # schema. The compose file uses only plain ${VAR} (no ${VAR:?required}),
        # so unset vars default to empty with a warning — `-q` still exits 0.
        # Verified against the production compose file on the deploy host.
        run: docker compose config -q

      - name: Build backend image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build sidecar images (deploy branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -f ./recommender/Dockerfile .
          docker build -f ./crates/media-core/Dockerfile .
          docker build -f ./crates/transcoder/Dockerfile .
