name: yt-extractor canary

# Weekly upkeep for the native Rust YouTube extractor (crates/ytresolve) — our
# scaled-down stand-in for yt-dlp's full-time maintainer community.
#   - Syncs the rot-prone iOS Innertube client identity from yt-dlp upstream and
#     opens a PR when it drifts (the routine maintenance that keeps us current).
#   - Runs the real binary against live YouTube to catch hard breakage early.
#
# Note: GitHub runner IPs are sometimes throttled by YouTube, so the live check
# is best-effort here (continue-on-error); the authoritative live check runs from
# the NAS's residential egress via cron (see docs — same egress as production).

on:
  schedule:
    - cron: '17 6 * * 1' # Mondays 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build resolver
        run: cargo build -p ytresolve --release --bin eex-ytresolve

      - name: Sync client identity from yt-dlp upstream
        run: node scripts/yt-canary.mjs --fix

      - name: Live resolution check (best-effort from CI egress)
        continue-on-error: true
        run: node scripts/yt-canary.mjs

      - name: Open PR if the client identity drifted
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/yt-client-sync
          commit-message: 'chore(ytresolve): sync iOS Innertube client identity from yt-dlp upstream'
          title: 'chore(ytresolve): sync YouTube client identity'
          body: |
            Automated weekly sync of `crates/ytresolve/clients.json` to yt-dlp's
            current `INNERTUBE_CLIENTS` iOS identity. Merge, then rebuild +
            redeploy the backend so the resolver uses the fresh client version.
          delete-branch: true
