# The Emerald Exchange — production Nginx
#
# Two responsibilities:
#   1. Serve the built dashboard (dist/) as a single-page app.
#   2. Reverse-proxy the underlying *arr / SAB APIs at same-origin paths,
#      injecting API keys server-side so they never reach the browser.
#
# API keys come from container environment variables ($SONARR_API_KEY,
# $RADARR_API_KEY, $SAB_API_KEY). Substituted into this file at startup
# by Docker via envsubst (see Dockerfile).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so client-side
    # routing works on direct loads and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — deploys must take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed asset bundles can cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Sonarr ────────────────────────────────────────────────────────────
    # Sonarr has a URL base of /tv configured. The proxy_pass target ends
    # in /tv/ so the /api/sonarr/ prefix is rewritten to /tv/.
    location /api/sonarr/ {
        proxy_pass http://10.0.0.52:8989/tv/;
        proxy_set_header Host 10.0.0.52:8989;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Api-Key ${SONARR_API_KEY};
        proxy_http_version 1.1;
    }

    # ── Radarr ────────────────────────────────────────────────────────────
    # Radarr has a URL base of /movies configured.
    location /api/radarr/ {
        proxy_pass http://10.0.0.52:7878/movies/;
        proxy_set_header Host 10.0.0.52:7878;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Api-Key ${RADARR_API_KEY};
        proxy_http_version 1.1;
    }

    # ── SABnzbd ───────────────────────────────────────────────────────────
    # SAB takes its key as a URL param. Append it server-side so the browser
    # never sees the key. The Lua-free approach: rewrite to add ?apikey=...
    # if not already present in the query string.
    location /api/sab/ {
        if ($args = "") {
            set $args "apikey=${SAB_API_KEY}";
        }
        if ($args !~ "apikey=") {
            set $args "$args&apikey=${SAB_API_KEY}";
        }
        proxy_pass http://10.0.0.52:8080/;
        proxy_set_header Host 10.0.0.52:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }
}
