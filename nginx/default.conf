# The Emerald Exchange — production Nginx
#
# Serves the built dashboard (dist/) as a single-page app.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so client-side
    # routing works on direct loads and refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache index.html — deploys must take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hashed asset bundles can cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
