# Reproducible, hash-pinned dependency lock for the recommender service.
#
# Provenance: the baseline resolved set proven healthy in production
# (`docker exec exchange-recommender pip freeze`, 2026-06-07), hash-pinned
# 2026-06-11 with `uv pip compile --generate-hashes` (same versions; every
# artifact now carries sha256 hashes). pip turns on hash-checking mode
# automatically whenever a requirements file contains hashes, so the
# Dockerfile's `pip install -r requirements.lock` needs no extra flag — a
# substituted or tampered artifact now fails the install instead of shipping.
#
# Two packages are intentionally EXCLUDED (they are not installed from an index):
#   - emerald-contracts : built + installed from the PyO3 wheel in an earlier
#                         Dockerfile layer.
#   - exchange-recommender : the local package itself (`pip install --no-deps .`).
#
# torch is pinned to the CPU build (`+cpu`), which only resolves from PyTorch's
# CPU index — the Dockerfile installs this file with
#   --extra-index-url https://download.pytorch.org/whl/cpu
# so torch comes from there and everything else from PyPI. The CPU build keeps
# the ~6GB CUDA/nvidia stack out of the image (the NAS has no GPU).
#
# setuptools is held at >=83.0.0 for PYSEC-2026-3447 (CI pip-audit gate) even if
# the running container lags — do NOT let a regen drop it back.
# torch is held at >=2.13.0 because 2.11/2.12 require setuptools<82; 2.13 removes
# that ceiling. The two pins advanced together on 2026-07-18.
#
# REGENERATING after an intentional dependency bump (two passes, because
# download.pytorch.org answers 503 — not 404 — for packages it does not host,
# which kills any single-pass hash resolve that uses it as an extra index):
#   1. split the plain `name==version` pins: torch's `+cpu` pin in one file,
#      everything else in another.
#   2. uv pip compile <pypi-pins> --generate-hashes --no-deps --no-annotate \
#        --no-header --python-version 3.12 \
#        --python-platform x86_64-unknown-linux-gnu -o <out-pypi>
#   3. uv pip compile <torch-pin> --generate-hashes --no-deps --no-annotate \
#        --no-header --index-url https://download.pytorch.org/whl/cpu \
#        --python-version 3.12 --python-platform x86_64-unknown-linux-gnu \
#        -o <out-torch>
#   4. merge the two outputs alphabetically under this header.
# tests/test_lockfile_consistency.py gates the result (pyproject floors, the
# setuptools security floor, Torch compatibility, baseline integrity, and hash
# coverage on every pin).

