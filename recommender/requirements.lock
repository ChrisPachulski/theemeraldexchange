# Reproducible dependency lock for the recommender service.
#
# Provenance: pinned to the exact resolved set running and proven-healthy in
# production (`docker exec exchange-recommender pip freeze`, 2026-06-07). This
# replaces the old non-reproducible build that ran `pip install .` against the
# `>=` floors in pyproject.toml — every rebuild silently drifted to whatever
# was latest on PyPI that day.
#
# Regenerate after an intentional dependency bump:
#   docker exec exchange-recommender pip freeze | grep -viE '@ file://' > recommender/requirements.lock
#
# Two packages are intentionally EXCLUDED (they are not installed from an index):
#   - emerald-contracts : built + installed from the PyO3 wheel in an earlier
#                         Dockerfile layer.
#   - exchange-recommender : the local package itself (`pip install --no-deps .`).
#
# torch is pinned to the CPU build (`+cpu`), which only resolves from PyTorch's
# CPU index — the Dockerfile installs this file with
#   --extra-index-url https://download.pytorch.org/whl/cpu
# so torch comes from there and everything else from PyPI. The CPU build keeps
# the ~6GB CUDA/nvidia stack out of the image (the NAS has no GPU).
#
# NOTE: these are exact-version pins, not hash-pinned. Adding --require-hashes is
# a future hardening step (it needs a hash-aware resolver pass, complicated by
# the +cpu extra index); version pinning already makes the build deterministic.

