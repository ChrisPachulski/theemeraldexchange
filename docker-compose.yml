# Compose file for the production NAS deployment.
#
# Variable values come from a `.env` file in the same directory on the
# NAS (shipped from the laptop's .env.production via scripts/deploy-nas.sh).
# Docker Compose loads .env automatically — no env_file: directive needed.
#
# The backend binds 127.0.0.1:3001 only (LAN-invisible). cloudflared
# runs in host network mode so it can dial that loopback port directly,
# which keeps the tunnel's "URL: localhost:3001" config straightforward.
#
# The recommender service runs only inside the Docker network — the
# backend reaches it via `http://recommender:8000`. It is never exposed
# through the Cloudflare Tunnel. Port 8001 on loopback is for admin
# debugging only.

services:
  backend:
    build: .
    image: theemeraldexchange-backend:latest
    container_name: exchange-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # Grab-event log lives here so it survives container rebuilds and
      # admin can tail it directly on the NAS if the dashboard is down.
      - "/mnt/user/appdata/exchange-backend/data:/app/data"
    environment:
      NODE_ENV: production
      PORT: "3001"
      GRAB_LOG_PATH: "/app/data/grabs.jsonl"
      PLEX_CLIENT_ID: "${PLEX_CLIENT_ID}"
      SESSION_SECRET: "${SESSION_SECRET}"
      ADMINS: "${ADMINS:-}"
      PLEX_SERVER_ID: "${PLEX_SERVER_ID:-}"
      # Bootstrap escape hatch for the brief first-deploy window before
      # PLEX_SERVER_ID is known. Without this passthrough, env.ts's
      # production gate sees an unset value inside the container and
      # crashes the boot — even when the host-side deploy script
      # accepted the same opt-in. Default 0 keeps the gate locked.
      ALLOW_UNSCOPED_PLEX_LOGIN: "${ALLOW_UNSCOPED_PLEX_LOGIN:-0}"
      PLEX_SERVER_URL: "${PLEX_SERVER_URL:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      SONARR_URL: "${SONARR_URL:-}"
      SONARR_API_KEY: "${SONARR_API_KEY}"
      RADARR_URL: "${RADARR_URL:-}"
      RADARR_API_KEY: "${RADARR_API_KEY}"
      SAB_URL: "${SAB_URL:-}"
      SAB_API_KEY: "${SAB_API_KEY}"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN:-}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      MIN_FREE_GB: "${MIN_FREE_GB:-100}"
      MAX_MOVIE_SIZE_GB: "${MAX_MOVIE_SIZE_GB:-10}"
      MAX_TV_GB_PER_EPISODE: "${MAX_TV_GB_PER_EPISODE:-5}"
      # Quality-profile name (case-insensitive) the server picks for
      # non-admin adds. Without this passthrough the .env.production
      # value never reaches the backend container and the server falls
      # back to "choose me" — fine if the household happens to use that
      # name, silently wrong otherwise. env.ts lowercases on load so the
      # comparison is symmetric.
      DEFAULT_PROFILE_NAME: "${DEFAULT_PROFILE_NAME:-Choose Me}"
      DEFAULT_ROOT_FOLDER_PATH: "${DEFAULT_ROOT_FOLDER_PATH:-}"
      DEFAULT_SONARR_ROOT_FOLDER_PATH: "${DEFAULT_SONARR_ROOT_FOLDER_PATH:-}"
      DEFAULT_RADARR_ROOT_FOLDER_PATH: "${DEFAULT_RADARR_ROOT_FOLDER_PATH:-}"
      # Local recommender wiring. Flip USE_LOCAL_RECOMMENDER=1 once the
      # recommender container is healthy and its DB has been bootstrapped.
      USE_LOCAL_RECOMMENDER: "${USE_LOCAL_RECOMMENDER:-0}"
      RECOMMENDER_URL: "${RECOMMENDER_URL:-http://recommender:8000}"
      RECOMMENDER_EVENT_SECRET: "${RECOMMENDER_EVENT_SECRET:-}"

  recommender:
    build: ./recommender
    image: theemeraldexchange-recommender:latest
    container_name: exchange-recommender
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      # SQLite DB + sentence-transformer cache live here so the catalog
      # survives rebuilds. Kept separate from /mnt/user/appdata/exchange-
      # backend/recommender/ which is the rsync source dir for `build:`.
      - "/mnt/user/appdata/exchange-backend/recommender-db:/data"
    environment:
      NODE_ENV: production
      RECOMMENDER_DB_PATH: "/data/exchange.db"
      RECOMMENDER_HOST: "0.0.0.0"
      RECOMMENDER_PORT: "8000"
      # Optimizer's eval gate reads this JSONL of frozen past sessions.
      # The Dockerfile intentionally does NOT bake the holdout into the
      # image (it's operator-curated history, not source) and the deploy
      # rsync excludes it. Place the file at this path on the host's
      # /mnt/user/appdata/exchange-backend/recommender-db/ — mounted as
      # /data inside the container — and the optimizer will promote
      # candidate models that beat baseline on this set. With no
      # holdout present, every optimizer run records the candidate as
      # an inactive proposal and active stays put.
      RECOMMENDER_HOLDOUT_PATH: "${RECOMMENDER_HOLDOUT_PATH:-/data/holdout.jsonl}"
      RECOMMENDER_DEFAULT_RECIPE: "${RECOMMENDER_DEFAULT_RECIPE:-mmr_diverse}"
      RECOMMENDER_COLD_START_THRESHOLD: "${RECOMMENDER_COLD_START_THRESHOLD:-10}"
      RECOMMENDER_OPTIMIZER_MAX_DRIFT_PCT: "${RECOMMENDER_OPTIMIZER_MAX_DRIFT_PCT:-0.20}"
      RECOMMENDER_EVENT_SECRET: "${RECOMMENDER_EVENT_SECRET:-}"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN:-}"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      # The optimizer is the only place Claude runs server-side. Per-user
      # suggestion calls never see this key — they go to the local model.
      ANTHROPIC_API_KEY: "${ANTHROPIC_OPTIMIZER_KEY:-}"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: exchange-cloudflared
    restart: unless-stopped
    network_mode: host
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${TUNNEL_TOKEN}"
    depends_on:
      - backend
